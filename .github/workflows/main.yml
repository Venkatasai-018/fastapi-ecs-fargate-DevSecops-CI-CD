name: FastAPI ECR PUSH ECS + FARGATE DEPLOY

on:
  push:
    branches: [ main ,feature/*,develop/* ,develop,release/* ,release]
  workflow_dispatch:  # Allows manual triggering of the workflow from the GitHub Actions tab


# OIDC permissions for keyless authentication
permissions:
  id-token: write
  contents: read



jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

  
    # Just update the deployment timestamp in the JavaScript file
    - name: Update deployment timestamp
      run: |
        echo "// Updating timestamp for deployment on $(date)" >> js/script.js
        echo "// Deployment ID: ${{ github.run_id }}" >> js/script.js

  

    # OIDC/IRSA Authentication - No more access keys!
    - name: Configure AWS credentials via OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.OIDC_CONNECT }}
        role-session-name: GitHubActions-Backend-${{ github.run_id }}
        aws-region: "ap-south-1"
    
    # checking the connection with AWS OIDC
    - name: Verify AWS OIDC Authentication
      run: |
        echo "Verifying AWS OIDC Authentication..."
        aws sts get-caller-identity