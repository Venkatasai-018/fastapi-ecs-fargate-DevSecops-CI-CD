name: Terraform Deployment

on:
  push:
    branches:
      - main
      - develop 
      - release
      - feature/*
    paths:
      - terraform/**
  workflow_dispatch:

# OIDC permissions for keyless authentication
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: "ap-south-2"

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    # OIDC Authentication - No access keys needed
    - name: Configure AWS credentials via OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.OIDC_CONNECT }}
        role-session-name: GitHubActions-Terraform-${{ github.run_id }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Verify AWS OIDC Authentication
      run: aws sts get-caller-identity

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.5.0

    - name: Terraform Init
      run: terraform init

    - name: Terraform Plan
      run: terraform plan

    - name: Terraform Apply
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feature/*'
      run: terraform apply -auto-approve
    