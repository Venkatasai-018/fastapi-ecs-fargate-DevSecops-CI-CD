name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: 'Type "destroy" to confirm infrastructure destruction'
        required: true
        type: string

# OIDC permissions for keyless authentication
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: "ap-south-2"

jobs:
  plan-destroy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
    - name: Validate confirmation input
      if: ${{ github.event.inputs.confirm_destroy != 'destroy' }}
      run: |
        echo "❌ You must type 'destroy' to confirm infrastructure destruction"
        exit 1

    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Configure AWS credentials via OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.OIDC_CONNECT }}
        role-session-name: GitHubActions-Destroy-${{ github.run_id }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Verify AWS OIDC Authentication
      run: aws sts get-caller-identity

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.5.0

    - name: Terraform Init
      run: terraform init

    - name: Terraform Destroy Plan
      run: terraform plan -destroy -out=destroy.tfplan

    - name: Upload destroy plan
      uses: actions/upload-artifact@v4
      with:
        name: destroy-plan
        path: terraform/destroy.tfplan

  approve-destroy:
    runs-on: ubuntu-latest
    needs: plan-destroy
    environment: production  # Requires manual approval in this environment

    steps:
    - name: Approval confirmed
      run: echo "✅ Destruction approved by reviewer"

  execute-destroy:
    runs-on: ubuntu-latest
    needs: approve-destroy
    defaults:
      run:
        working-directory: terraform

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Configure AWS credentials via OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.OIDC_CONNECT }}
        role-session-name: GitHubActions-Destroy-${{ github.run_id }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.5.0

    - name: Terraform Init
      run: terraform init

    - name: Terraform Destroy
      run: terraform destroy -auto-approve

    - name: Destruction complete
      run: echo "🗑️ Infrastructure has been destroyed successfully"